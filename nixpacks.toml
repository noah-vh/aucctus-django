# Nixpacks config for Railway / Dokploy / Coolify etc.
# Pinning Python so the deploy target matches local dev.

[phases.setup]
nixPkgs = ["python312", "gcc", "postgresql.lib"]

[phases.install]
cmds = ["python -m venv /opt/venv", ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"]

[phases.build]
cmds = [". /opt/venv/bin/activate && python manage.py collectstatic --noinput"]

[start]
# Default start command — override per-service in the Railway UI
# (web / worker / beat all live in this same repo).
cmd = ". /opt/venv/bin/activate && python manage.py migrate --noinput && gunicorn config.wsgi --bind 0.0.0.0:$PORT --timeout 600 --workers 2 --threads 4"
